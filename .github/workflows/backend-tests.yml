name: Backend Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./bookup

    steps:
      - name: Baixar código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Dar permissão ao Maven Wrapper
        run: chmod +x mvnw

      - name: Rodar testes com cobertura
        run: ./mvnw clean test

      - name: Salvar relatório JaCoCo
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-jacoco
          path: bookup/target/site/jacoco

      - name: Analisar com SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          ./mvnw sonar:sonar
          -Dsonar.projectKey=Smyano_Projeto-qualidade-de-software
          -Dsonar.organization=smyano
          -Dsonar.host.url=https://sonarcloud.io